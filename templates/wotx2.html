<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoTx2 — Radar des Compétences</title>
<script src="{{ myIPFS }}/ipns/copylaradio.com/nostr.bundle.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #0d1117;
  color: #c9d1d9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: .6rem 1rem;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-wrap: wrap;
}
header h2 { font-size: 1.1rem; color: #58a6ff; white-space: nowrap; }
#filters { display: flex; gap: .3rem; }
.flt {
  padding: .25rem .65rem;
  border: 1px solid #30363d;
  border-radius: 1rem;
  background: #21262d;
  color: #8b949e;
  cursor: pointer;
  font-size: .78rem;
  font-family: inherit;
}
.flt.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
#auth { margin-left: auto; display: flex; align-items: center; gap: .5rem; }
#btn-connect {
  padding: .25rem .65rem;
  border: 1px solid #388bfd;
  border-radius: .4rem;
  background: transparent;
  color: #58a6ff;
  cursor: pointer;
  font-size: .8rem;
  font-family: inherit;
}
#btn-connect:hover { background: #1f6feb22; }
#user-tag { font-size: .72rem; color: #8b949e; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#radar-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  position: relative;
  overflow: hidden;
}
#radar {
  width: min(96vw, 680px);
  height: min(96vw, 680px);
}
.ring { fill: none; stroke: #21262d; stroke-width: 1; }
.ring-label { font-size: 9px; fill: #484f58; }
.spoke { stroke: #21262d; stroke-width: 1; }
.skill-label { font-size: 10px; fill: #8b949e; }
.dot { cursor: pointer; transition: r .15s; }
.dot:hover { r: 9; }
#tooltip {
  position: fixed;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: .4rem;
  padding: .4rem .6rem;
  font-size: .75rem;
  pointer-events: none;
  display: none;
  z-index: 99;
  max-width: 200px;
  line-height: 1.4;
}
footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .4rem 1rem;
  background: #161b22;
  border-top: 1px solid #30363d;
  font-size: .78rem;
  flex-wrap: wrap;
  gap: .5rem;
}
#stats { color: #8b949e; }
#link-minelife {
  color: #58a6ff;
  text-decoration: none;
  padding: .2rem .5rem;
  border: 1px solid #1f6feb;
  border-radius: .4rem;
}
#link-minelife:hover { background: #1f6feb22; }
#legend {
  display: flex;
  gap: .8rem;
  font-size: .72rem;
  color: #8b949e;
}
.leg { display: flex; align-items: center; gap: .3rem; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
#status-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #484f58;
  font-size: .85rem;
  text-align: center;
  pointer-events: none;
}
</style>
</head>
<body>

<header>
  <h2>⚗️ WoTx2</h2>
  <div id="filters">
    <button class="flt active" onclick="setFilter('ALL')">ALL</button>
    <button class="flt" onclick="setFilter('P2P')">P2P</button>
    <button class="flt" onclick="setFilter('12P')">12P</button>
    <button class="flt" onclick="setFilter('P21')">P21</button>
  </div>
  <div id="auth">
    <button id="btn-connect" onclick="connectNIP07()">🔑 Connecter</button>
    <span id="user-tag"></span>
  </div>
</header>

<div id="radar-wrap">
  <svg id="radar" viewBox="-310 -310 620 620"></svg>
  <div id="status-msg">Connexion au relay…</div>
  <div id="tooltip"></div>
</div>

<footer>
  <div id="legend">
    <span class="leg"><span class="leg-dot" style="background:#ffd700"></span> Moi</span>
    <span class="leg"><span class="leg-dot" style="background:#56d364"></span> N1</span>
    <span class="leg"><span class="leg-dot" style="background:#79c0ff"></span> N2</span>
    <span class="leg"><span class="leg-dot" style="background:#8b949e"></span> Autre</span>
  </div>
  <div id="stats">—</div>
  <a href="{{ uSPOT }}/minelife" id="link-minelife">⚗️ Atelier MineLife →</a>
</footer>

<script>
const RELAY     = "{{ nostr_relay }}";
const MY_IPFS   = "{{ myIPFS }}";
const USPOT     = "{{ uSPOT }}";
const NODE_ID   = "{{ IPFSNODEID }}";
const INIT_NPUB = "{{ npub or '' }}";

const META_T    = new Set(['permit','auto_proclaimed','composite','formation','training']);
const MAX_LEVELS = 5;
const MAX_SKILLS = 24;

// ── State ────────────────────────────────────────────────────────────────────
let myPubkeyHex = null;
let n1 = new Set();           // follows (hex)
let n2 = new Set();           // follows-of-follows (hex)
let n1EndorserOf = {};        // hex → Set of n1 pubkeys who endorsed them

let allCerts = [];            // Kind 30503 events
let profiles  = {};           // hex → {name, picture}

let currentFilter = 'ALL';
let pool = null;

// ── Filter tabs ───────────────────────────────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.flt').forEach(b =>
    b.classList.toggle('active', b.textContent === f));
  drawRadar(filterCerts());
}

// ── NIP-07 ───────────────────────────────────────────────────────────────────
async function connectNIP07() {
  if (!window.nostr) { alert('Extension NIP-07 introuvable (nos2x, Alby…)'); return; }
  try {
    myPubkeyHex = await window.nostr.getPublicKey();
    document.getElementById('user-tag').textContent = abbr(myPubkeyHex);
    document.getElementById('btn-connect').textContent = '✓ Connecté';
    await loadN1();
    drawRadar(filterCerts());
  } catch(e) { console.error('NIP-07', e); }
}

// ── Network graph N1 / N2 ────────────────────────────────────────────────────
async function loadN1() {
  const ev = await poolList([{ kinds:[3], authors:[myPubkeyHex], limit:1 }]);
  if (ev.length) {
    n1 = new Set(ev[0].tags.filter(t => t[0]==='p').map(t => t[1]));
  }
  const n1arr = [...n1].slice(0, 20);
  if (!n1arr.length) return;

  // N2 (light subset)
  const ev2 = await poolList([{ kinds:[3], authors:n1arr, limit:20 }]);
  ev2.forEach(e => e.tags.filter(t=>t[0]==='p').forEach(t => n2.add(t[1])));

  // Endorsements from N1 (Kind 30502) to build P21 index
  const ev3 = await poolList([{ kinds:[30502], authors:n1arr, limit:300 }]);
  ev3.forEach(e => {
    e.tags.filter(t=>t[0]==='p').map(t=>t[1]).forEach(target => {
      if (!n1EndorserOf[target]) n1EndorserOf[target] = new Set();
      n1EndorserOf[target].add(e.pubkey);
    });
  });
}

// ── SimplePool ───────────────────────────────────────────────────────────────
function getPool() {
  if (!pool && typeof NostrTools !== 'undefined' && NostrTools.SimplePool) {
    pool = new NostrTools.SimplePool();
  }
  return pool;
}

function poolList(filters) {
  const p = getPool();
  if (!p) return Promise.resolve([]);
  return new Promise(res => {
    const evs = [];
    const s = p.subscribeMany([RELAY], filters, {
      onevent: e => evs.push(e),
      oneose: () => { s.close(); res(evs); }
    });
    setTimeout(() => { try { s.close(); } catch(_){} res(evs); }, 7000);
  });
}

// ── Load Kind 30503 ───────────────────────────────────────────────────────────
async function loadCerts() {
  setStatus('Chargement des certifications…');
  const evs = await poolList([{ kinds:[30503], limit:500 }]);

  // Fetch profiles for all authors
  const pubkeys = [...new Set(evs.map(e => e.pubkey))].slice(0, 80);
  if (pubkeys.length) {
    const profs = await poolList([{ kinds:[0], authors:pubkeys, limit:80 }]);
    profs.forEach(e => {
      try { profiles[e.pubkey] = JSON.parse(e.content); } catch(_){}
    });
  }

  allCerts = evs;
  setStatus('');
  drawRadar(filterCerts());
}

// ── Filter logic ──────────────────────────────────────────────────────────────
function filterCerts() {
  switch (currentFilter) {
    case 'P2P':
      // Self-attested: publisher is also the p-tag target
      return allCerts.filter(e => {
        const pTag = (e.tags.find(t => t[0]==='p') || [])[1];
        return pTag === e.pubkey;
      });
    case '12P':
      if (!myPubkeyHex) return allCerts;
      return allCerts.filter(e =>
        e.pubkey === myPubkeyHex || n1.has(e.pubkey) || n2.has(e.pubkey));
    case 'P21':
      if (!myPubkeyHex) return allCerts;
      return allCerts.filter(e => {
        if (e.pubkey === myPubkeyHex || n1.has(e.pubkey)) return true;
        return n2.has(e.pubkey) && (n1EndorserOf[e.pubkey] || new Set()).size > 0;
      });
    default:
      return allCerts;
  }
}

// ── Build plot data ───────────────────────────────────────────────────────────
function skillsFromEvent(e) {
  return e.tags
    .filter(t => t[0]==='t' && t[1] && !META_T.has(t[1]))
    .map(t => t[1]);
}

function levelFromEvent(e) {
  const lTag = e.tags.find(t => t[0]==='level');
  return lTag ? Math.min(parseInt(lTag[1]) || 1, MAX_LEVELS) : 1;
}

function buildPlotData(certs) {
  // Count occurrences per skill to pick top MAX_SKILLS
  const skillCount = {};
  certs.forEach(e => skillsFromEvent(e).forEach(s => {
    skillCount[s] = (skillCount[s] || 0) + 1;
  }));

  const skills = Object.entries(skillCount)
    .sort((a, b) => b[1] - a[1])
    .slice(0, MAX_SKILLS)
    .map(([s]) => s);

  if (!skills.length) return { skills, dots: [] };

  // One dot per pubkey+skill (highest level wins)
  const best = {};
  certs.forEach(e => {
    const level = levelFromEvent(e);
    skillsFromEvent(e).forEach(skill => {
      if (!skills.includes(skill)) return;
      const k = `${e.pubkey}|${skill}`;
      if (!best[k] || level > best[k].level) {
        best[k] = { pubkey: e.pubkey, skill, level, eventId: e.id };
      }
    });
  });

  return { skills, dots: Object.values(best) };
}

// ── Draw radar (SVG) ──────────────────────────────────────────────────────────
function drawRadar(certs) {
  const { skills, dots } = buildPlotData(certs);
  const svg = document.getElementById('radar');

  if (!skills.length) {
    svg.innerHTML = '';
    setStatus('Aucune certification trouvée pour ce filtre.');
    updateStats(0, 0, certs.length);
    return;
  }
  setStatus('');

  const R = 265;
  const N = skills.length;
  let out = '';

  // Level rings
  for (let l = 1; l <= MAX_LEVELS; l++) {
    const r = Math.round((l / MAX_LEVELS) * R);
    out += `<circle cx="0" cy="0" r="${r}" class="ring"/>`;
    out += `<text x="4" y="${-r + 10}" class="ring-label">X${l}</text>`;
  }

  // Spokes + skill labels
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
    const x2 = +(Math.cos(angle) * R).toFixed(1);
    const y2 = +(Math.sin(angle) * R).toFixed(1);
    out += `<line x1="0" y1="0" x2="${x2}" y2="${y2}" class="spoke"/>`;

    const lx = +(Math.cos(angle) * (R + 22)).toFixed(1);
    const ly = +(Math.sin(angle) * (R + 22)).toFixed(1);
    const anchor = lx > 8 ? 'start' : lx < -8 ? 'end' : 'middle';
    const label = skills[i].length > 13 ? skills[i].slice(0, 12) + '…' : skills[i];
    out += `<text x="${lx}" y="${ly + 3}" class="skill-label" text-anchor="${anchor}">${escHtml(label)}</text>`;
  }

  // Group dots at same (skill, level) for jitter
  const groups = {};
  dots.forEach(d => {
    const k = `${d.skill}|${d.level}`;
    (groups[k] = groups[k] || []).push(d);
  });

  // Render dots
  dots.forEach(d => {
    const si = skills.indexOf(d.skill);
    if (si < 0) return;
    const angle  = (si / N) * 2 * Math.PI - Math.PI / 2;
    const radius = (d.level / MAX_LEVELS) * R;

    const grp = groups[`${d.skill}|${d.level}`];
    const idx  = grp.indexOf(d);
    const jitter = (idx - (grp.length - 1) / 2) * 9;
    const perp   = angle + Math.PI / 2;

    const px = (Math.cos(angle) * radius + Math.cos(perp) * jitter).toFixed(1);
    const py = (Math.sin(angle) * radius + Math.sin(perp) * jitter).toFixed(1);

    const isMe  = d.pubkey === myPubkeyHex;
    const isN1  = n1.has(d.pubkey);
    const isN2  = n2.has(d.pubkey);
    const color = isMe ? '#ffd700' : isN1 ? '#56d364' : isN2 ? '#79c0ff' : '#8b949e';
    const dotR  = isMe ? 8 : 6;
    const prof  = profiles[d.pubkey] || {};
    const name  = prof.name || abbr(d.pubkey);

    out += `<circle cx="${px}" cy="${py}" r="${dotR}" fill="${color}" class="dot"
      data-name="${escHtml(name)}" data-skill="${escHtml(d.skill)}"
      data-level="${d.level}" data-pk="${d.pubkey}"
      onclick="openProfile('${d.pubkey}')"
      onmouseover="showTip(event,this)" onmouseout="hideTip()"/>`;
  });

  svg.innerHTML = out;
  updateStats(skills.length, dots.length, certs.length);
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tip = document.getElementById('tooltip');

function showTip(ev, el) {
  tip.innerHTML = `<b>${escHtml(el.dataset.name)}</b><br>${escHtml(el.dataset.skill)} · X${el.dataset.level}`;
  tip.style.display = 'block';
  moveTip(ev);
}

document.addEventListener('mousemove', ev => {
  if (tip.style.display !== 'none') moveTip(ev);
});

function moveTip(ev) {
  let x = ev.clientX + 14, y = ev.clientY + 14;
  if (x + tip.offsetWidth  > window.innerWidth)  x -= tip.offsetWidth  + 28;
  if (y + tip.offsetHeight > window.innerHeight) y -= tip.offsetHeight + 28;
  tip.style.left = x + 'px';
  tip.style.top  = y + 'px';
}

function hideTip() { tip.style.display = 'none'; }

function openProfile(hex) {
  const npub = hexToNpub(hex);
  window.open(`${USPOT}/minelife?npub=${npub}`, '_blank');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function abbr(hex)   { return hex ? hex.slice(0, 8) + '…' + hex.slice(-4) : ''; }
function escHtml(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function hexToNpub(hex) {
  try {
    if (typeof NostrTools !== 'undefined' && NostrTools.nip19)
      return NostrTools.nip19.npubEncode(hex);
  } catch(_) {}
  return hex;
}

function setStatus(msg) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function updateStats(nSkills, nDots, nCerts) {
  if (nSkills === undefined) {
    document.getElementById('stats').textContent =
      RELAY.replace(/^wss?:\/\//, '').split('/')[0];
    return;
  }
  document.getElementById('stats').textContent =
    `${nSkills} skill${nSkills !== 1 ? 's' : ''} · ` +
    `${nDots} porteur${nDots !== 1 ? 's' : ''} · ` +
    `${nCerts} cert${nCerts !== 1 ? 's' : ''} [${currentFilter}]`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateStats();
  loadCerts();
  // Auto-connect if npub was passed and NIP-07 is available
  if (INIT_NPUB && window.nostr) connectNIP07();
});
</script>

</body>
</html>
